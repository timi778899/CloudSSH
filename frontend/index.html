<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Kvmidc-SSH终端</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "background": "#f5f9ff",
          "on-surface": "#172033",
          "on-surface-variant": "#64748b",
          "outline": "#b9cbe3",
          "outline-variant": "#dbeafe",
          "primary-container": "#2563eb",
          "on-primary-fixed": "#ffffff",
          "surface": "#ffffff",
          "surface-variant": "#eef6ff",
          "secondary-container": "#38bdf8",
          "secondary-fixed": "#dff3ff",
          "error": "#dc2626",
          "error-container": "#fee2e2",
          "surface-container-lowest": "#eef6ff"
        },
        fontFamily: {
          "body": ["Inter", "Microsoft YaHei", "PingFang SC", "Arial", "sans-serif"],
          "headline": ["Inter", "Microsoft YaHei", "PingFang SC", "Arial", "sans-serif"],
          "label": ["Inter", "Microsoft YaHei", "PingFang SC", "Arial", "sans-serif"],
          "code": ["JetBrains Mono", "Cascadia Code", "Consolas", "monospace"]
        }
      }
    }
  }
  </script>
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen font-body text-sm overflow-hidden bg-background text-on-surface">
  <div id="app">
    <div id="auth-section" class="auth-shell min-h-screen flex items-center justify-center p-5 md:p-8 relative">
      <main class="login-layout w-full max-w-[980px] relative z-10">
        <section class="login-intro">
          <div class="inline-flex items-center gap-3">
            <div class="brand-mark">
              <span class="material-symbols-outlined" style="font-size: 27px;">cloud</span>
            </div>
            <div>
              <div class="text-3xl font-bold text-slate-950 tracking-normal">Kvmidc-SSH终端<span class="blinking-cursor"></span></div>
              <div class="mt-1 text-sm text-slate-500">服务器远程连接控制台</div>
            </div>
          </div>
          <div class="intro-copy">
            <h1>快速连接你的服务器</h1>
            <p>输入主机、账号和认证方式，即可在浏览器中开启安全终端会话。</p>
          </div>
          <div class="intro-metrics">
            <div>
              <span class="material-symbols-outlined">lock</span>
              <strong>安全认证</strong>
            </div>
            <div>
              <span class="material-symbols-outlined">key</span>
              <strong>密钥登录</strong>
            </div>
            <div>
              <span class="material-symbols-outlined">terminal</span>
              <strong>在线终端</strong>
            </div>
          </div>
        </section>

        <section class="business-panel login-card">
          <div class="flex items-center justify-between mb-6 pb-4 border-b border-outline-variant">
            <div>
              <span class="text-xs font-semibold text-blue-600">连接配置</span>
              <h2 class="mt-1 text-xl font-semibold text-slate-950">新建 SSH 会话</h2>
            </div>
            <span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 0;">dns</span>
          </div>
          <div id="connection-form-container"></div>
        </section>
      </main>
    </div>

    <div id="terminal-section" class="hidden h-screen flex-col bg-background text-on-surface">
      <header class="flex justify-between items-center w-full px-6 h-16 bg-surface border-b border-outline-variant z-50 shadow-sm">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-primary-container text-white flex items-center justify-center">
            <span class="material-symbols-outlined" style="font-size: 20px;">cloud</span>
          </div>
          <h1 class="text-xl font-bold text-slate-900 tracking-normal cursor-pointer">Kvmidc-SSH终端</h1>
        </div>
        <div class="flex items-center gap-3 text-slate-600">
          <select id="theme-selector" class="bg-white text-slate-600 text-xs py-2 px-3 border border-outline-variant outline-none cursor-pointer rounded-md focus:ring-2 focus:ring-blue-100 focus:border-primary-container">
            <option value="business">商务白</option>
            <option value="glacier">深夜蓝</option>
            <option value="gruvbox">经典深色</option>
          </select>
          <button id="disconnect-btn" class="hover:bg-blue-50 hover:text-primary-container transition-colors cursor-pointer p-2 rounded-md flex items-center justify-center" title="断开连接">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">power_settings_new</span>
          </button>
        </div>
      </header>

      <main class="flex-1 p-6 pb-14 relative bg-surface-container-lowest overflow-hidden">
        <div id="terminal-wrapper" class="h-full w-full border border-outline-variant bg-white rounded-lg p-4 overflow-hidden font-code text-[13px] text-slate-800 relative z-0 flex flex-col shadow-sm">
          <div class="flex justify-between items-center border-b border-outline-variant pb-2 mb-4 text-slate-500 text-[11px]">
            <div class="flex gap-6 flex-wrap">
              <span id="term-status" class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-emerald-500"></div> 已连接</span>
              <span id="term-host">主机：-</span>
              <span id="term-user">用户：-</span>
              <span id="term-port">端口：-</span>
            </div>
            <div>
              <span id="term-info"></span>
            </div>
          </div>
          <div id="terminal-container" class="flex-1 overflow-hidden"></div>
        </div>
      </main>

      <footer class="fixed bottom-0 left-0 w-full px-6 py-2 flex justify-between items-center z-50 bg-white/85 backdrop-blur-md border-t border-outline-variant text-xs h-12">
        <div class="text-slate-500">© <span id="copyright-year"></span> Kvmidc-SSH终端</div>
        <div class="flex gap-4">
          <a class="text-slate-500 hover:text-primary-container transition-colors" href="https://github.com/newbietan/CloudSSH">项目文档</a>
        </div>
      </footer>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
